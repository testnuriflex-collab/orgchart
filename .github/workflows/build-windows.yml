name: Windows 실행파일 빌드 (build-windows)

# PyInstaller는 대상 OS 위에서 실행해야 네이티브 exe가 나온다(크로스 컴파일 불가).
# macOS 로컬에서는 Windows exe를 만들 수 없으므로, GitHub이 제공하는 실제 Windows
# 가상머신(windows-latest 러너)에서 빌드한다 — 2026-07 기준 PyInstaller 공식/커뮤니티
# 문서가 공통으로 권장하는 방식(Wine 크로스빌드는 PySide6/Qt처럼 무거운 GUI 의존성에서
# 신뢰도가 낮아 채택하지 않음).
on:
  push:
    branches: [master, main]
    paths:
      - "dev/**"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dev
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치 (앱 + PyInstaller)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: pytest 전체 실행 (빌드 전 회귀 검증)
        run: python -m pytest -q

      - name: PyInstaller 빌드 (Windows exe)
        run: python -m PyInstaller packaging/org-chart-studio.spec --noconfirm --clean

      - name: 산출물 스모크 확인 (즉시 크래시 여부)
        # 주의: EXE는 console=False(윈도 서브시스템)로 빌드된다. pwsh의 `& exe` +
        # $LASTEXITCODE 조합은 콘솔 서브시스템이 아닌 GUI 서브시스템 실행파일에서
        # 자식 프로세스 종료를 기다리지 않고 먼저 $LASTEXITCODE를 평가해버리는
        # 레이스가 실제로 재현됨(첫 Windows CI 가동에서 확인) → 반드시 종료를
        # 명시적으로 기다리는 Start-Process -Wait -PassThru로 종료코드를 받는다.
        shell: pwsh
        run: |
          $env:ORG_CHART_STUDIO_SMOKE = "1"
          $proc = Start-Process -FilePath ".\dist\start_windows\OrgChartStudio.exe" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            throw "OrgChartStudio.exe smoke run exited with code $($proc.ExitCode)"
          }

      - name: 실행파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: OrgChartStudio-windows
          path: dev/dist/start_windows/
          if-no-files-found: error
          retention-days: 30
