name: Windows 실행파일 빌드 (build-windows)

# PyInstaller는 대상 OS 위에서 실행해야 네이티브 exe가 나온다(크로스 컴파일 불가).
# macOS 로컬에서는 Windows exe를 만들 수 없으므로, GitHub이 제공하는 실제 Windows
# 가상머신(windows-latest 러너)에서 빌드한다 — 2026-07 기준 PyInstaller 공식/커뮤니티
# 문서가 공통으로 권장하는 방식(Wine 크로스빌드는 PySide6/Qt처럼 무거운 GUI 의존성에서
# 신뢰도가 낮아 채택하지 않음).
on:
  push:
    branches: [master, main]
    paths:
      - "실행관리(Ops-Run)/**"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 실행관리(Ops-Run)
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치 (앱 + PyInstaller)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: pytest 전체 실행 (빌드 전 회귀 검증)
        run: python -m pytest -q

      - name: PyInstaller 빌드 (Windows exe)
        run: python -m PyInstaller packaging/org-chart-studio.spec --noconfirm --clean

      - name: 산출물 스모크 확인 (즉시 크래시 여부)
        shell: pwsh
        run: |
          $env:ORG_CHART_STUDIO_SMOKE = "1"
          & ".\dist\OrgChartStudio\OrgChartStudio.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "OrgChartStudio.exe smoke run exited with code $LASTEXITCODE"
          }

      - name: 실행파일 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: OrgChartStudio-windows
          path: 실행관리(Ops-Run)/dist/OrgChartStudio/
          if-no-files-found: error
          retention-days: 30
